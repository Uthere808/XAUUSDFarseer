name: XAUUSD daily forecast

on:
  schedule:
    # GitHub Actions schedule uses cron syntax (UTC by default).
    # We run daily and let the script gate on Europe/Berlin local 20:00.
    # This allows Sunday 20:00 Berlin runs to prepare Monday's forecast.
    - cron: '7 18 * * *'
    - cron: '7 19 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Send email even if it is not 20:00 Europe/Berlin (for testing)'
        required: false
        type: boolean
        default: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run forecast + email report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && inputs.force_send }}
        run: |
          python run_xauusd_forecast.py
